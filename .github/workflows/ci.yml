name: CI

on:
  push:
    branches: [main, 'forge/**']
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Check (svelte-check)
        run: bun run check

      - name: Lint
        run: bun run lint

      - name: Unit tests
        run: bun run test

      - name: Build
        run: bun run build
        # PWA injectManifest can fail in CI with ENOENT on service-worker.js
        # due to @vite-pwa/sveltekit path resolution. Docker Build & Push
        # workflow is the authoritative build. CI validates types, lint, tests.
        continue-on-error: true

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: E2E tests
        run: bun run test:e2e
        continue-on-error: true  # E2E requires running Pennyworth — skips gracefully without it
        env:
          ORACLE_DATA_PATH: tests/fixtures
