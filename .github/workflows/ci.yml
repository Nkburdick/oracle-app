name: CI

on:
  push:
    branches: [main, 'forge/**']
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Check (svelte-check)
        run: bun run check

      - name: Lint
        run: bun run lint

      - name: Unit tests
        run: bun run test

      - name: Build
        run: bun run build

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: E2E tests
        run: bun run test:e2e
        env:
          ORACLE_DATA_PATH: tests/fixtures
